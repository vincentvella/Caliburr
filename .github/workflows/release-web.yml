name: Release Web

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  web:
    name: Export, upload source maps, deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Export web
        run: bunx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUE_CAT_WEB_KEY: ${{ secrets.EXPO_PUBLIC_REVENUE_CAT_WEB_KEY }}

      - name: Inject + upload source maps to Sentry
        run: |
          bunx @sentry/cli sourcemaps inject dist/
          bunx @sentry/cli sourcemaps upload \
            --org vellapps-s1 \
            --project caliburr \
            --release ${{ github.ref_name }} \
            dist/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to EAS
        run: bunx eas-cli@latest deploy --prod --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
