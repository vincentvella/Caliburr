appId: coffee.caliburr.app
name: 'Screenshot — Liked Recipes tab'
---
- launchApp
- runFlow: _sign_in.yaml
- waitForAnimationToEnd
- openLink: 'caliburr:///(tabs)/recipes?screenshot=1'
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn:
          text: 'Open'
- waitForAnimationToEnd
# Switch to Liked tab
- tapOn:
    id: 'tab-liked'
- waitForAnimationToEnd
- takeScreenshot: .maestro/screenshots/05_liked_recipes
