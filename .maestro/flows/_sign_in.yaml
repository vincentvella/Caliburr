# Shared sign-in sub-flow. Expects MAESTRO_EMAIL and MAESTRO_PASSWORD env vars.
# Usage: runFlow: flows/_sign_in.yaml
- tapOn:
    text: "Email"
- inputText: ${MAESTRO_EMAIL}
- tapOn:
    text: "Password"
- inputText: ${MAESTRO_PASSWORD}
- tapOn:
    text: "Sign In"
- waitForAnimationToEnd
# Wait until the Explore tab is visible (auth gate redirected)
- assertVisible:
    text: "Explore"
