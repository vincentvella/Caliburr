appId: coffee.caliburr.app
# Shared sign-in sub-flow. Expects MAESTRO_EMAIL and MAESTRO_PASSWORD env vars.
# If already signed in, skips sign-in entirely.
# Usage: runFlow: _sign_in.yaml
---
# Wait for the app to finish loading.
# Two waitForAnimationToEnd passes (screenshot-based, no hierarchy query) give
# the XCTest accessibility tree time to stabilize after launchApp before we
# start asserting element visibility — prevents kAXErrorInvalidUIElement crashes.
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Caliburr'
    timeout: 15000
# If the Expo dev client launcher is showing, open the app from it
- runFlow:
    when:
      visible: 'Development Build'
    commands:
      - tapOn:
          text: 'Caliburr'
          index: 1
      - waitForAnimationToEnd
      - waitForAnimationToEnd
# Dismiss any lingering "Open in Caliburr?" system dialog from a prior openLink
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn:
          text: 'Open'
      - waitForAnimationToEnd
# Only sign in if we're on the sign-in screen
- runFlow:
    when:
      visible: 'Email'
    commands:
      - tapOn:
          text: 'Email'
      - inputText: ${MAESTRO_EMAIL}
      - tapOn:
          text: 'Password'
      - inputText: ${MAESTRO_PASSWORD}
      - tapOn:
          text: 'Sign In'
      - waitForAnimationToEnd
# Skip onboarding regardless of how we got here (post-signin OR signed-in but
# onboarding_completed is unset). Walks the 4-step flow:
# welcome → profile → grinder → machine → done.
- runFlow:
    when:
      visible: 'Get started'
    commands:
      - tapOn:
          text: 'Get started'
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: 'Pick a handle'
          commands:
            - tapOn:
                text: 'Continue →'
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible: 'Add your grinder'
          commands:
            - tapOn:
                text: 'Skip for now →'
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible: 'Add your machine'
          commands:
            - tapOn:
                text: 'Skip for now →'
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible: 'Explore brews'
          commands:
            - tapOn:
                text: 'Explore brews'
            - waitForAnimationToEnd
# Always navigate to Explore tab to ensure consistent starting state
- tapOn:
    id: 'nav-explore'
- waitForAnimationToEnd
# Assert we're on the main app (search bar only exists on Explore tab)
- assertVisible:
    text: 'Search grinder, bean, method...'
