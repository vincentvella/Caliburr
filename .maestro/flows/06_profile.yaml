appId: coffee.caliburr.app
name: 'Screenshot — Profile (My Gear)'
---
- launchApp
- runFlow: _sign_in.yaml
- waitForAnimationToEnd
- openLink: 'caliburr:///(tabs)/profile?screenshot=1'
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn:
          text: 'Open'
- waitForAnimationToEnd
- takeScreenshot: .maestro/screenshots/06_profile
