appId: coffee.caliburr.app
name: 'Screenshot — Onboarding'
# Uses the DEV TOOLS "Preview onboarding" button on the Profile tab —
# no fresh account needed.
---
- launchApp
- runFlow: _sign_in.yaml
- tapOn:
    id: 'nav-profile'
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: 'Preview onboarding'
    direction: DOWN
- tapOn:
    text: 'Preview onboarding'
- waitForAnimationToEnd
# Step 0: Welcome
- assertVisible:
    text: 'Caliburr'
- takeScreenshot: screenshots/${DEVICE_DIR}/00a_onboarding_welcome
- tapOn:
    text: 'Get started'
- waitForAnimationToEnd
# Step 1: Pick a handle — navigate past without screenshotting
- assertVisible:
    text: 'Pick a handle'
- tapOn:
    text: 'Continue →'
- waitForAnimationToEnd
# Step 2: Add grinder — navigate past without screenshotting
- assertVisible:
    text: 'Add your grinder'
- tapOn:
    text: 'Skip for now →'
- waitForAnimationToEnd
# Step 3: Add machine — navigate past
- assertVisible:
    text: 'Add your machine'
- tapOn:
    text: 'Skip for now →'
- waitForAnimationToEnd
# Step 4: Done
- assertVisible:
    text: 'Ready to explore'
