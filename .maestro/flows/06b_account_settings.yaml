appId: coffee.caliburr.app
name: 'Screenshot — Account Settings'
---
- launchApp
- runFlow: _sign_in.yaml
- waitForAnimationToEnd
- tapOn:
    id: 'nav-profile'
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: 'account-settings-row'
    direction: DOWN
- tapOn:
    id: 'account-settings-row'
- waitForAnimationToEnd
- takeScreenshot: screenshots/06b_account_settings
