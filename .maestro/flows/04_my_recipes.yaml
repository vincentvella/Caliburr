appId: coffee.caliburr.app
name: 'Screenshot — My Recipes (Mine tab)'
---
- launchApp
- runFlow: _sign_in.yaml
- waitForAnimationToEnd
- openLink: 'caliburr:///(tabs)/recipes?screenshot=1'
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn:
          text: 'Open'
- waitForAnimationToEnd
- takeScreenshot: .maestro/screenshots/04_my_recipes
