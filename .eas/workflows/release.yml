name: Release

on:
  push:
    branches:
      - release

jobs:
  # iOS and Android builds run in parallel
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  # Submissions wait for their respective builds
  submit_ios:
    name: Submit to App Store Connect
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  # Workaround: `type: submit` shells out to fastlane without quoting
  # `--track`, which truncates track names containing spaces (e.g. "Beta
  # Testers"). The CLI submit path uses spawn-with-args and preserves the
  # value, so we invoke it from a custom step instead.
  submit_android:
    name: Submit to Google Play (Beta Testers)
    needs: [build_android]
    steps:
      - name: Submit via eas-cli
        run: |
          npx -y eas-cli@latest submit \
            --platform android \
            --profile production \
            --id ${{ needs.build_android.outputs.build_id }} \
            --non-interactive
