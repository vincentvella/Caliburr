name: Release Android

on:
  push:
    branches:
      - release-android

jobs:
  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  submit_android:
    name: Submit to Google Play (Internal track)
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
