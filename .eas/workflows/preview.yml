name: Preview

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # iOS simulator build and web preview run in parallel
  build_ios_simulator:
    name: Build iOS simulator
    type: build
    params:
      platform: ios
      profile: preview

  deploy_web_preview:
    name: Deploy web preview
    type: deploy
    params:
      prod: false
