name: Preview

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # iOS simulator, Android device build, and web preview run in parallel
  build_ios_simulator:
    name: Build iOS simulator
    type: build
    params:
      platform: ios
      profile: preview

  build_android_preview:
    name: Build Android (internal)
    type: build
    params:
      platform: android
      profile: preview

  deploy_web_preview:
    name: Deploy web preview
    type: deploy
    params:
      prod: false
